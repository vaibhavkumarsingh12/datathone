<svg viewBox="0 0 880 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SPEAR — Karnataka Crime Intelligence Platform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0B1220"/>
      <stop offset="55%" stop-color="#111C2E"/>
      <stop offset="100%" stop-color="#0A1526"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4C87D8" stop-opacity="0.15"/>
      <stop offset="45%"  stop-color="#4C87D8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#57C58C" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#EAF2FF"/>
      <stop offset="60%"  stop-color="#9FC4F5"/>
      <stop offset="100%" stop-color="#57C58C"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .wire{
        stroke:url(#wire); stroke-width:2; fill:none; stroke-linecap:round;
        stroke-dasharray:14 10; animation:flow 3.4s linear infinite;
      }
      @keyframes flow{ to{ stroke-dashoffset:-96; } }

      .node{ filter:url(#glow); transform-box:fill-box; transform-origin:center; }
      .n1{ animation:pulse 2.6s ease-in-out infinite;          }
      .n2{ animation:pulse 2.6s ease-in-out .45s infinite;     }
      .n3{ animation:pulse 2.6s ease-in-out .90s infinite;     }
      .n4{ animation:pulse 2.6s ease-in-out 1.35s infinite;    }
      .n5{ animation:pulse 2.6s ease-in-out 1.80s infinite;    }
      @keyframes pulse{
        0%,100%{ r:5;   opacity:.55; }
        50%    { r:8.5; opacity:1;   }
      }

      .ring{ fill:none; stroke:#57C58C; stroke-width:1.4; opacity:0; animation:ripple 3.2s ease-out infinite; }
      @keyframes ripple{
        0%  { r:6;  opacity:.75; }
        80% { r:30; opacity:0;   }
        100%{ r:30; opacity:0;   }
      }

      .title{ font-family:'Segoe UI',Inter,system-ui,sans-serif; font-weight:800; font-size:50px;
              fill:url(#ink); letter-spacing:9px; animation:rise 1.1s cubic-bezier(.2,.8,.2,1) both; }
      .sub  { font-family:'Segoe UI',Inter,system-ui,sans-serif; font-weight:500; font-size:15.5px;
              fill:#8FA6C4; letter-spacing:2.4px; animation:rise 1.1s .22s cubic-bezier(.2,.8,.2,1) both; }
      .tag  { font-family:'Segoe UI',Inter,system-ui,sans-serif; font-weight:600; font-size:11.5px;
              fill:#6E86A6; letter-spacing:1.6px; animation:rise 1.1s .42s cubic-bezier(.2,.8,.2,1) both; }
      @keyframes rise{ from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:translateY(0);} }

      .scan{ fill:#4C87D8; opacity:.05; animation:sweep 7s ease-in-out infinite; }
      @keyframes sweep{ 0%,100%{ transform:translateX(-160px);} 50%{ transform:translateX(880px);} }
    </style>
  </defs>

  <rect width="880" height="200" rx="16" fill="url(#bg)"/>
  <rect class="scan" x="0" y="0" width="150" height="200"/>

  <!-- data spine: raw FIRs on the left, decisions on the right -->
  <path class="wire" d="M64,150 C 190,150 190,116 300,116 S 470,150 596,116 S 740,150 820,132"/>

  <circle class="node n1" cx="64"  cy="150" r="5" fill="#4C87D8"/>
  <circle class="node n2" cx="228" cy="128" r="5" fill="#4C87D8"/>
  <circle class="node n3" cx="392" cy="128" r="5" fill="#7FA9E4"/>
  <circle class="node n4" cx="596" cy="116" r="5" fill="#57C58C"/>
  <circle class="node n5" cx="820" cy="132" r="5" fill="#57C58C"/>
  <circle class="ring"    cx="820" cy="132" r="6"/>

  <text class="title" x="60" y="82">S P E A R</text>
  <text class="sub"   x="64" y="110">Karnataka Crime Intelligence Platform</text>
  <text class="tag"   x="64" y="180">10,770 FIRs  →  WHERE · WHO · WHAT NEXT · WHAT DOESN'T FIT</text>
</svg>
